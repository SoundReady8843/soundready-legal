<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SoundReady</title>
  <style>
    :root {
      --bg: #060d18;
      --bg-deep: #0b1d33;
      --panel: rgba(10, 20, 37, 0.76);
      --panel-strong: rgba(9, 19, 35, 0.92);
      --border: rgba(146, 195, 235, 0.16);
      --text: #edf5ff;
      --muted: #a9bfd8;
      --accent: #7bd2ff;
      --accent-strong: #dff4ff;
      --shadow: 0 36px 90px rgba(0, 0, 0, 0.42);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI Variable", "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 10% 8%, rgba(87, 176, 255, 0.22), transparent 24%),
        radial-gradient(circle at 84% 14%, rgba(56, 140, 244, 0.14), transparent 20%),
        linear-gradient(140deg, var(--bg) 0%, var(--bg-deep) 56%, #040913 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 18px 40px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 16%),
        repeating-linear-gradient(90deg,
          transparent 0 120px,
          rgba(140, 192, 235, 0.05) 120px 121px,
          transparent 121px 240px);
      opacity: 0.6;
    }
    .shell {
      width: min(1180px, 100%);
      margin: 0 auto;
    }
    .card {
      background: linear-gradient(180deg, rgba(10, 21, 39, 0.9), var(--panel-strong));
      border: 1px solid var(--border);
      border-radius: 30px;
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .hero {
      position: relative;
      display: block;
      min-height: 0;
      background:
        linear-gradient(115deg, rgba(6, 14, 28, 0.88) 0%, rgba(7, 18, 34, 0.76) 46%, rgba(7, 18, 34, 0.2) 100%),
        linear-gradient(180deg, rgba(10, 23, 43, 0.1), rgba(10, 23, 43, 0.55));
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 16% 18%, rgba(110, 202, 255, 0.24), transparent 16%),
        radial-gradient(circle at 40% 58%, rgba(255, 255, 255, 0.08), transparent 18%);
      pointer-events: none;
    }
    .brand-wrap,
    .hero-media {
      position: relative;
      z-index: 1;
    }
    .brand-wrap {
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .hero-media {
      display: none;
    }
    .brand-banner {
      position: relative;
      min-height: 270px;
      border-radius: 0;
      overflow: hidden;
      border: 0;
      background: #07182c url("https://raw.githubusercontent.com/SoundReady8843/Admin-soundready/main/docs/assets/hero-banner.png") center center / contain no-repeat;
      box-shadow: none;
      padding: 0;
    }
    .brand-banner::before {
      content: none;
    }
    .brand-banner > * {
      display: none;
    }
    .eyebrow {
      display: none;
    }
    h1 {
      margin: 0;
      font-family: "Baskerville Old Face", "Palatino Linotype", Georgia, serif;
      font-size: clamp(3.2rem, 6vw, 5.4rem);
      line-height: 0.94;
      letter-spacing: -0.04em;
      color: #ffffff;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.28), 0 1px 0 rgba(255, 255, 255, 0.12);
    }
    .subtitle {
      margin: 10px 0 0;
      color: #ffffff;
      font-family: "Baskerville Old Face", "Palatino Linotype", Georgia, serif;
      font-size: clamp(1rem, 1.8vw, 1.28rem);
      font-weight: 600;
      max-width: none;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.28);
    }
    .hero-photo {
      display: none;
    }
    .hero-photo::before {
      content: none;
    }
    .hero-photo::after {
      content: none;
    }
    .content {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(300px, 0.85fr);
      gap: 24px;
      padding: 28px 30px 32px;
    }
    .intro {
      margin: 0;
      color: var(--muted);
      line-height: 1.78;
      font-size: 1.02rem;
    }
    .panel {
      background: linear-gradient(180deg, rgba(10, 21, 38, 0.9), rgba(10, 19, 33, 0.78));
      border: 1px solid rgba(163, 201, 237, 0.12);
      border-radius: 20px;
      padding: 24px;
    }
    .intro-panel {
      display: grid;
      gap: 18px;
    }
    .signal-line {
      display: none;
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-strong);
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }
    li {
      margin: 0;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .nav-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(173, 212, 244, 0.1);
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
    }
    .nav-link:hover {
      text-decoration: none;
      border-color: rgba(110, 200, 255, 0.36);
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-1px);
    }
    .contact {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 0.96rem;
    }
    .contact a {
      color: var(--accent-strong);
    }
    .legal-note {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.7;
    }
    @media (max-width: 820px) {
      .hero {
        min-height: auto;
      }
      .brand-wrap {
        padding: 0;
      }
      .hero-media {
        display: none;
      }
      .brand-banner {
        min-height: 220px;
      }
      .content {
        grid-template-columns: 1fr;
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <div class="hero">
        <div class="brand-wrap">
          <div class="brand-banner" aria-hidden="true"></div>
        </div>
        <div class="hero-media">
          <div class="hero-photo" aria-hidden="true"></div>
        </div>
      </div>
      <div class="content">
        <div class="panel intro-panel">
          <div class="signal-line" aria-hidden="true"></div>
          <p class="intro">
            SoundReady is a desktop workflow for creators to prepare and publish no-copyright music videos,
            including short-form posting integrations.
          </p>
          <p class="contact">Contact: <a href="mailto:soundready8843@gmail.com">soundready8843@gmail.com</a></p>
        </div>
        <aside class="panel">
          <h2>Legal</h2>
          <ul>
            <li><a class="nav-link" href="./terms.html">Terms of Service</a></li>
            <li><a class="nav-link" href="./privacy.html">Privacy Policy</a></li>
          </ul>
          <p class="legal-note">Official legal pages for platform review and policy validation.</p>
        </aside>
      </div>
    </section>
  </main>
</body>
</html>
